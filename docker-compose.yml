version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: session_logger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sessionuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sessionpass}
      POSTGRES_DB: ${POSTGRES_DB:-session_logger}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sessionuser}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: session_logger_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
